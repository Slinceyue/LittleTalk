# ===========================================
# LittleTalk 配置文件
# ===========================================

system:
  ip: 0.0.0.0
  port: 8080
  env: dev
  gin_mode: debug
  server_time_out: 2      # 服务器超时时间（秒）

log:
  app: LittleTalk
  dir: logs

jwt:
  expire: 3              # Token过期时间（天）
  secret: xxx
  issuer: slince

redis:
  db: 0
  host: 127.0.0.1
  port: 6379
  password: j20060907
  pool_size: 20
  online_expire: 50      # 用户在线状态过期时间（秒）

websocket:
  heartbeat_interval: 15   # 心跳间隔（秒）
  heartbeat_timeout: 45    # 心跳超时（秒）
  read_buffer_size: 1024
  write_buffer_size: 1024

message:
  msg_expire: 7            # 消息保存天数
  max_chat_history: 100    # 单个对话最大历史消息数
  msg_processed_ttl: 5     # 已处理消息保存时间（分钟）

cache:
  user_info_expire: 3600   # 用户信息缓存过期时间（秒），默认1小时

# 数据库配置 - 支持主从分离
db:                        # 从库配置（读操作）
  user: root
  password: j20060907
  host: 127.0.0.1
  port: 3306
  db: little_talk
  debug: false
  source: mysql

db_master:                 # 主库配置（写操作）
  user: root
  password: j20060907
  host: 127.0.0.1
  port: 3306
  db: little_talk
  debug: false
  source: mysql